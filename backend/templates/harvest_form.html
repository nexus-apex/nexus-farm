{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Harvest | NexusFarm{% endblock %}
{% block page_title %}{% if editing %}Edit Harvest{% else %}New Harvest{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Crop Name</label>
        <input type="text" name="crop_name" value="{{ record.crop_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Field Name</label>
        <input type="text" name="field_name" value="{{ record.field_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantity Kg</label>
        <input type="number" step="0.01" name="quantity_kg" value="{{ record.quantity_kg|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Quality Grade</label>
        <select name="quality_grade">
          <option value="a" {% if record.quality_grade == 'a' %}selected{% endif %}>A</option>
          <option value="b" {% if record.quality_grade == 'b' %}selected{% endif %}>B</option>
          <option value="c" {% if record.quality_grade == 'c' %}selected{% endif %}>C</option>
          <option value="rejected" {% if record.quality_grade == 'rejected' %}selected{% endif %}>Rejected</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Harvest Date</label>
        <input type="date" name="harvest_date" value="{{ record.harvest_date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Sold Price</label>
        <input type="number" step="0.01" name="sold_price" value="{{ record.sold_price|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Buyer</label>
        <input type="text" name="buyer" value="{{ record.buyer|default:'' }}">
      </div>
      <div class="form-group">
        <label>Revenue</label>
        <input type="number" step="0.01" name="revenue" value="{{ record.revenue|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Harvest</button>
      <a href="/harvests/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
